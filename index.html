    <script>
      // Production pages include crawlable fallback content inside #root. Hide
      // it before the body can paint when JavaScript will replace it, while
      // keeping it visible for crawlers and visitors without JavaScript.
      document.documentElement.classList.add('has-js')

      var initialTheme = 'dark'

      try {
        var savedTheme = localStorage.getItem('rb-theme')
        var hasThemeOverride = localStorage.getItem('rb-theme-user-set') === 'true'
        var hasValidSavedTheme = savedTheme === 'dark' || savedTheme === 'light'

        // Older builds wrote rb-theme automatically, so only the explicit
        // marker proves that the visitor intentionally chose a theme.
        if (hasValidSavedTheme && hasThemeOverride) initialTheme = savedTheme
      } catch (e) {}

      var initialThemeIsDark = initialTheme === 'dark'
      document.documentElement.dataset.theme = initialTheme
      document.querySelector('meta[name="theme-color"]').content = initialThemeIsDark
        ? '#000000'
        : '#ffffff'
      document.querySelector('#site-favicon-ico').href = initialThemeIsDark
        ? '/favicon.ico'
        : '/favicon-white.ico'
      document.querySelector('#site-favicon-32').href = initialThemeIsDark
        ? '/favicon-32x32.png'
        : '/favicon-white-32x32.png'
      document.querySelector('#site-favicon-16').href = initialThemeIsDark
        ? '/favicon-16x16.png'
        : '/favicon-white-16x16.png'
    </script>

      html { background: #000000 }
